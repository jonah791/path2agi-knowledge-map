<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Path2AGI</title>
<style>
:root {
  --bg: #1a1b26; --bg2: #1f2133; --bg3: #25273c; --bg4: #2d2f44;
  --text: #c9d1d9; --text-dim: #8b949e; --text-dimmer: #5d6470;
  --accent: #8b7aff; --accent2: #00d4ff; --border: #303245; --radius: 8px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }
.layout { display: flex; max-width: 1600px; margin: 0 auto; min-height: 100vh; }
/* Sidebar */
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 12px 0; overflow-y: auto; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
.sidebar-group { margin-bottom: 4px; }
.sidebar-group-header { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; user-select: none; }
.sidebar-group-header:hover { background: var(--bg3); }
.sidebar-group-header .arrow { font-size: 8px; transition: transform 0.2s; }
.sidebar-group-header.collapsed .arrow { transform: rotate(-90deg); }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 5px 16px 5px 32px; font-size: 13px; }
.sidebar-item:hover { background: var(--bg3); }
.sidebar-item.active { background: var(--bg4); border-left: 2px solid var(--accent); }
.sidebar-item a { color: var(--text-dim); text-decoration: none; }
.sidebar-item.active a { color: var(--text); }
.sn { color: var(--text-dimmer); font-family: var(--font-mono); font-size: 11px; width: 20px; text-align: right; flex-shrink: 0; }
.g-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
/* Main content */
.main { flex: 1; padding: 0; min-width: 0; }
.content { max-width: 860px; margin: 0 auto; padding: 48px 40px 80px; }
/* Topic meta */
.topic-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; font-size: 12px; color: var(--text-dimmer); }
.topic-meta span { display: flex; align-items: center; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
/* Typography */
h1 { font-size: 28px; margin-bottom: 12px; line-height: 1.3; }
h2 { font-size: 20px; margin-top: 40px; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
h3 { font-size: 16px; margin-top: 28px; margin-bottom: 8px; }
p { margin-bottom: 16px; }
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }
ul, ol { margin-bottom: 16px; padding-left: 24px; }
li { margin-bottom: 4px; }
code { font-family: var(--font-mono); background: var(--bg3); padding: 2px 6px; border-radius: 4px; font-size: 90%; }
pre { background: var(--bg3); padding: 16px; border-radius: var(--radius); overflow-x: auto; margin-bottom: 16px; }
pre code { background: none; padding: 0; }
blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 16px 0; background: var(--bg3); border-radius: 0 var(--radius) var(--radius) 0; }
table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
th, td { padding: 8px 12px; border: 1px solid var(--border); text-align: left; }
th { background: var(--bg3); font-weight: 600; }
strong { color: #e6edf3; }
img { max-width: 100%; border-radius: var(--radius); }
/* Annotations */
.annt { cursor: help; border-bottom: 1px dashed var(--accent); color: var(--accent); }
.annt-popup { position: fixed; z-index: 1000; background: var(--bg2); border: 1px solid var(--accent); border-radius: var(--radius); padding: 12px 16px; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); font-size: 13px; line-height: 1.5; color: var(--text); }
.annt-popup strong { color: var(--accent); display: block; margin-bottom: 4px; }
.annt-close { float: right; cursor: pointer; color: var(--text-dimmer); font-size: 14px; }
/* TOC sidebar */
.toc-sidebar { width: 200px; padding: 48px 16px; position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0; display: block; }
.toc-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dimmer); margin-bottom: 12px; }
.toc-link { display: block; font-size: 12px; color: var(--text-dimmer); padding: 3px 0; text-decoration: none; border-left: 2px solid transparent; padding-left: 8px; }
.toc-link.h3 { padding-left: 20px; }
.toc-link:hover, .toc-link.active { color: var(--accent); border-left-color: var(--accent); }
/* Bottom nav */
.bottom-nav { display: flex; justify-content: space-between; margin-top: 60px; padding-top: 24px; border-top: 1px solid var(--border); }
.bottom-nav a { display: flex; flex-direction: column; gap: 4px; padding: 12px 16px; border-radius: var(--radius); background: var(--bg3); max-width: 45%; }
.bottom-nav a:hover { background: var(--bg4); text-decoration: none; }
.dir { font-size: 11px; color: var(--text-dimmer); }
.name { font-size: 13px; color: var(--text); }
/* Related topics */
.related-section { margin-top: 40px; }
.related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-top: 12px; }
.related-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg3); border-radius: var(--radius); font-size: 13px; }
.related-item:hover { background: var(--bg4); text-decoration: none; }
.r-num { font-family: var(--font-mono); font-size: 10px; color: var(--text-dimmer); }
/* Back to top */
.back-top { position: fixed; bottom: 24px; right: 24px; width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; border: none; font-size: 18px; cursor: pointer; opacity: 0; transition: opacity 0.3s; z-index: 100; }
.back-top.visible { opacity: 0.8; }
.back-top:hover { opacity: 1; }
/* TOC toggle (mobile) */
.toc-toggle { display: none; }
.toc-drawer { display: none; }
/* Progress bar */
#progress-bar { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 999; width: 0; transition: width 0.1s; }
/* Responsive */
@media (max-width: 1200px) {
  .toc-sidebar { display: none; }
  .sidebar { display: none; }
  .sidebar.open { display: block; position: fixed; z-index: 500; width: 280px; }
  .sidebar-overlay.open { display: block; }
  .content { padding: 32px 20px 60px; }
  .toc-toggle { display: block; position: fixed; bottom: 72px; right: 24px; z-index: 99; background: var(--bg4); color: var(--text); border: 1px solid var(--border); padding: 8px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }
  .toc-drawer.open { display: block; position: fixed; bottom: 0; left: 0; right: 0; max-height: 60vh; background: var(--bg2); border-top: 1px solid var(--border); z-index: 200; padding: 16px 20px; overflow-y: auto; border-radius: 12px 12px 0 0; }
}
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 499; }
</style>
</head>
<body>
<div id="progress-bar"></div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
</nav>
<button id="menuBtn" style="display:none">☰</button>
<div class="layout">
<main class="main">
  <div class="content">
    加载中...
  </div>
</main>
</div>
</body>
</html>
